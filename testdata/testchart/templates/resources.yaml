apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-controller
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
    spec:
      serviceAccountName: {{ default (printf "%s-sa" .Chart.Name) .Values.serviceAccount.name }}
      securityContext:
{{ toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
{{ toYaml .Values.controller.extraArgs | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.port }}
          securityContext:
{{ toYaml .Values.controller.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.controller.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-controller
  annotations:
{{ toYaml .Values.controller.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.controller.service.type }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
  ports:
    - name: http
      port: {{ .Values.controller.service.port }}
      targetPort: http
